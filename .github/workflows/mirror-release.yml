name: Mirror Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write
  actions: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          mkdir -p artifacts

          gh release download "$TAG" \
            --repo ljchang/flowmail \
            --pattern "*.dmg" \
            --pattern "*.tar.gz" \
            --pattern "latest.json" \
            --dir artifacts

      - name: Patch latest.json URL to point to public repo
        run: |
          sed -i 's|ljchang/flowmail/releases|ljchang/flowmail-site/releases|g' artifacts/latest.json
          cat artifacts/latest.json

      - name: Fetch release notes from private repo
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          gh release view "$TAG" --repo ljchang/flowmail --json body -q .body > /tmp/notes.md
          cat /tmp/notes.md

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"

          gh release create "$TAG" artifacts/* \
            --title "FlowMail $TAG" \
            --notes-file /tmp/notes.md

      - name: Update changelog
        env:
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          python3 << 'SCRIPT'
          import os
          from datetime import datetime, timezone

          tag = os.environ["TAG"]
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          with open("/tmp/notes.md", "r") as f:
              notes = f.read().strip()

          # Strip private repo compare links
          lines = []
          for line in notes.splitlines():
              if "github.com/ljchang/flowmail/compare" in line:
                  continue
              lines.append(line)
          notes = "\n".join(lines).strip()

          with open("docs/changelog.md", "r") as f:
              content = f.read()

          marker = "<!-- RELEASES -->"
          entry = f"\n\n## {tag} ({date})\n\n{notes}\n"

          content = content.replace(
              "*No releases published yet. Check back soon!*", ""
          )
          content = content.replace(marker, marker + entry)

          with open("docs/changelog.md", "w") as f:
              f.write(content)
          SCRIPT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/changelog.md
          git commit -m "Add release notes for $TAG" || echo "No changelog changes"
          git push

      - name: Trigger GitHub Pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml
