name: Mirror Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write
  actions: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          mkdir -p artifacts

          gh release download "$TAG" \
            --repo ljchang/flowmail \
            --pattern "*.dmg" \
            --pattern "*.tar.gz" \
            --pattern "latest.json" \
            --dir artifacts

      - name: Patch latest.json URL to point to public repo
        run: |
          sed -i 's|ljchang/flowmail/releases|ljchang/flowmail-site/releases|g' artifacts/latest.json
          cat artifacts/latest.json

      - name: Fetch release notes from private repo
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          gh release view "$TAG" --repo ljchang/flowmail --json body -q .body > /tmp/notes.md
          cat /tmp/notes.md

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"

          gh release create "$TAG" artifacts/* \
            --title "FlowMail $TAG" \
            --notes-file /tmp/notes.md

      - name: Update changelog
        env:
          TAG: ${{ github.event.client_payload.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fix credentials: gh commands above may have overridden the
          # credential helper with PRIVATE_REPO_TOKEN. Reset to GITHUB_TOKEN.
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"

          # Pull latest in case another release pushed since checkout
          git pull --rebase origin main

          python3 << 'SCRIPT'
          import os
          from datetime import datetime, timezone

          tag = os.environ["TAG"]
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          with open("/tmp/notes.md", "r") as f:
              notes = f.read().strip()

          # Strip private repo compare links
          lines = []
          for line in notes.splitlines():
              if "github.com/ljchang/flowmail/compare" in line:
                  continue
              lines.append(line)
          notes = "\n".join(lines).strip()

          with open("docs/changelog.md", "r") as f:
              content = f.read()

          # Skip if this version is already in the changelog
          if f"## {tag} (" in content:
              print(f"{tag} already in changelog, skipping")
              exit(0)

          marker = "<!-- RELEASES -->"
          entry = f"\n\n## {tag} ({date})\n\n{notes}\n"

          content = content.replace(
              "*No releases published yet. Check back soon!*", ""
          )
          content = content.replace(marker, marker + entry)

          with open("docs/changelog.md", "w") as f:
              f.write(content)
          SCRIPT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/changelog.md
          git diff --cached --quiet && echo "No changelog changes" && exit 0
          git commit -m "Add release notes for $TAG"

          # Retry with rebase if another release pushed between pull and push
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), rebasing and retrying..."
            git pull --rebase origin main
            sleep 2
          done

      - name: Trigger GitHub Pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml
