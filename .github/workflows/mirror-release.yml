name: Mirror Release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          mkdir -p artifacts

          gh release download "$TAG" \
            --repo ljchang/flowmail \
            --pattern "*.dmg" \
            --pattern "*.tar.gz" \
            --pattern "latest.json" \
            --dir artifacts

      - name: Patch latest.json URL to point to public repo
        run: |
          sed -i 's|ljchang/flowmail/releases|ljchang/flowmail-site/releases|g' artifacts/latest.json
          cat artifacts/latest.json

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          NOTES="${{ github.event.client_payload.notes }}"

          gh release create "$TAG" artifacts/* \
            --title "FlowMail $TAG" \
            --notes "$NOTES"

      - name: Update changelog
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          DATE=$(date -u +%Y-%m-%d)

          python3 << 'SCRIPT'
          import os

          tag = os.environ.get("TAG", "")
          date = os.environ.get("DATE", "")
          # Read notes from the dispatch payload via env
          notes = """${{ github.event.client_payload.notes }}"""

          with open("docs/changelog.md", "r") as f:
              content = f.read()

          marker = "<!-- RELEASES -->"
          entry = f"\n\n## {tag} ({date})\n\n{notes}\n"

          # Remove the placeholder text if present
          content = content.replace(
              "*No releases published yet. Check back soon!*", ""
          )
          content = content.replace(marker, marker + entry)

          with open("docs/changelog.md", "w") as f:
              f.write(content)
          SCRIPT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/changelog.md
          git commit -m "Add release notes for $TAG" || echo "No changelog changes"
          git push
